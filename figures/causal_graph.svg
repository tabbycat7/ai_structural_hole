<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">AI 结构洞实验因果图</title>
  <desc id="desc">问题 Q 指向内容特征 S、结构特征 O 和结果 Y；内容特征 S 指向结构特征 O 和结果 Y；结构特征 O、模型 M、竞争环境 R 都指向结果 Y。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42526e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#172b4d" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; fill: #172b4d; }
      .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; fill: #5e6c84; }
      .node-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; fill: #172b4d; }
      .node-note { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; fill: #344563; }
      .edge { fill: none; stroke: #42526e; stroke-width: 2.4; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #6b778c; stroke-width: 2.1; marker-end: url(#arrow); }
      .caption { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; fill: #344563; }
      .caption-strong { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; fill: #172b4d; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="620" fill="#ffffff"/>
  <!-- Edges are drawn behind the nodes. -->
  <path class="edge" d="M 290 141 C 335 126, 365 122, 420 121"/>
  <path class="edge" d="M 290 141 C 356 191, 364 295, 420 341"/>
  <path class="edge" d="M 535 162 C 535 201, 535 250, 535 300"/>
  <path class="edge-soft" d="M 290 158 C 454 198, 664 166, 790 248"/>
  <path class="edge" d="M 650 121 C 707 128, 739 172, 790 237"/>
  <path class="edge" d="M 650 341 C 705 337, 740 309, 790 290"/>
  <path class="edge" d="M 290 301 C 459 302, 625 251, 790 259"/>
  <path class="edge-soft" d="M 290 471 C 501 535, 733 463, 800 326"/>

  <text class="title" x="70" y="58">项目当前因果图</text>

  <!-- Root and mediator nodes. -->
  <g filter="url(#shadow)">
    <rect x="70" y="100" width="220" height="82" rx="8" fill="#deebff" stroke="#4c9aff" stroke-width="1.5"/>
    <rect x="420" y="80" width="230" height="82" rx="8" fill="#e3fcef" stroke="#36b37e" stroke-width="1.5"/>
    <rect x="420" y="300" width="230" height="82" rx="8" fill="#fff0b3" stroke="#ffab00" stroke-width="1.5"/>
    <rect x="70" y="260" width="220" height="82" rx="8" fill="#e6fcff" stroke="#00b8d9" stroke-width="1.5"/>
    <rect x="70" y="430" width="220" height="82" rx="8" fill="#ffebe6" stroke="#ff7452" stroke-width="1.5"/>
    <rect x="790" y="220" width="240" height="106" rx="8" fill="#f4f5f7" stroke="#172b4d" stroke-width="1.8"/>
  </g>

  <text class="node-title" x="180" y="132" text-anchor="middle">问题 Q</text>
  <text class="node-note" x="180" y="158" text-anchor="middle">用户问题及领域</text>

  <text class="node-title" x="535" y="112" text-anchor="middle">内容特征 S</text>
  <text class="node-note" x="535" y="138" text-anchor="middle">文章写了什么</text>

  <text class="node-title" x="535" y="332" text-anchor="middle">结构特征 O</text>
  <text class="node-note" x="535" y="358" text-anchor="middle">文章怎样组织信息</text>

  <text class="node-title" x="180" y="292" text-anchor="middle">模型 M</text>
  <text class="node-note" x="180" y="318" text-anchor="middle">哪个模型负责选择</text>

  <text class="node-title" x="180" y="462" text-anchor="middle">竞争环境 R</text>
  <text class="node-note" x="180" y="488" text-anchor="middle">候选数量、位置和竞争者</text>

  <text class="node-title" x="910" y="258" text-anchor="middle">结果 Y</text>
  <text class="node-note" x="910" y="285" text-anchor="middle">目标文章是否被选中</text>
  <text class="node-note" x="910" y="306" text-anchor="middle">1 = 是，0 = 否</text>

  <rect x="70" y="552" width="960" height="38" rx="8" fill="#f7f8fa" stroke="#dfe1e6"/>
  <text class="caption" x="92" y="576">
    <tspan class="caption-strong">后门调整：</tspan>
    研究 S 时控制 Q；研究 O 时控制 Q 和 S；M、R 在图中视为根节点，不另设后门调整集。
  </text>
</svg>
